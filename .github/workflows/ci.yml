name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (default — zero-dependency std build)
        run: cargo build --verbose
      - name: Build (full — db + auth features)
        run: cargo build --verbose --features full
      - name: Fixture suite
        run: cargo test --verbose

  # spec 29: fail the build on a RUSTSEC advisory in the dependency tree.
  # Advisory-gating, not version-pinning — plain `cargo audit` (no `--deny
  # warnings`) already fails on a real *vulnerability*; "unmaintained"/notice-
  # level warnings print but don't block (see SECURITY.md for the currently
  # known, triaged ones). Runs against the committed Cargo.lock.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
