name: perf

# The performance harness (spec 30). Advisory: it records the four metrics and
# prints the diff vs bench/baseline.json, but never fails the build on a
# regression (the gate is a signal, not a blocker). Manual or nightly.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build the compiler (release)
        run: cargo build --release
      - name: Run the harness (compile-time + bundle size, + live server metrics)
        run: node bench/run.mjs --server
      - name: Upload run results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results-*.json
          if-no-files-found: warn
